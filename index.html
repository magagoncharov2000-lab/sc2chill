<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skinoz Clone TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0f111a;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Шапка */
        .header {
            background: #161925;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #23283b;
        }
        .balance-container {
            font-size: 18px;
            font-weight: bold;
            color: #e4ae39;
            background: rgba(228, 174, 57, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(228, 174, 57, 0.3);
        }

        /* Контентные экраны */
        .screen {
            flex: 1;
            display: none;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
            padding-bottom: 90px; /* Чтобы нижнее меню не перекрывало контент */
        }
        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ЭКРАН 1: КЛИКЕР */
        .clicker-circle {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #2a2f45 0%, #161925 100%);
            border-radius: 50%;
            margin-top: 40px;
            border: 5px solid #e4ae39;
            box-shadow: 0 0 25px rgba(228, 174, 57, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.05s;
        }
        .clicker-circle:active {
            transform: scale(0.95);
        }
        .clicker-circle img {
            width: 120px;
            height: 120px;
            pointer-events: none;
        }

        /* ЭКРАН 2: КЕЙСЫ (Рулетка из прошлого шага) */
        .roulette-container {
            position: relative;
            width: 100%;
            max-width: 350px;
            height: 110px;
            background: #161925;
            border: 2px solid #23283b;
            border-radius: 12px;
            overflow: hidden;
            margin: 20px 0;
        }
        .pointer {
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 4px; height: 100%; background: #eb4b4b; z-index: 10;
        }
        .roulette-tape {
            display: flex; position: absolute; left: 0; top: 5px; height: 100px;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        .weapon-card {
            width: 90px; height: 95px; margin: 0 5px; background: #1c1f30;
            border-radius: 6px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 10px; text-align: center; flex-shrink: 0;
        }
        .weapon-card img { width: 65px; height: 45px; object-fit: contain; }
        .mil-spec { border-bottom: 3px solid #4b69ff; }
        .covert { border-bottom: 3px solid #eb4b4b; }
        .special { border-bottom: 3px solid #e4ae39; }

        .open-btn {
            background: #e4ae39; color: #000; border: none; padding: 12px 30px;
            font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer;
        }
        .open-btn:disabled { background: #444; color: #888; }

        /* ЭКРАН 3: ПРОФИЛЬ */
        .stats-card {
            background: #161925; width: 100%; padding: 15px;
            border-radius: 10px; border: 1px solid #23283b; margin-top: 15px;
        }

        /* НИЖНЕЕ МЕНЮ (НАВИГАЦИЯ) */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 70px;
            background: #161925;
            border-top: 1px solid #23283b;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom); /* Поддержка челок iPhone */
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8a8f9d;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
            width: 25%;
        }
        .nav-item.active {
            color: #e4ae39;
        }
        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="username">Игрок</div>
        <div class="balance-container"><span id="balance">0.00</span> $</div>
    </div>

    <div id="screen-clicker" class="screen active">
        <h2>Тапай и зарабатывай</h2>
        <p>Каждый клик дает +0.10$</p>
        <div class="clicker-circle" onclick="earnCoins(event)">
            <span style="font-size: 64px;">📦</span>
        </div>
    </div>

    <div id="screen-cases" class="screen">
        <h2>Магазин кейсов</h2>
        <p>Стоимость открытия: 5.00$</p>
        <div class="roulette-container">
            <div class="pointer"></div>
            <div class="roulette-tape" id="tape"></div>
        </div>
        <button class="open-btn" id="open-btn" onclick="openCase()">Открыть кейс</button>
        <div id="drop-result" style="margin-top: 15px; font-weight: bold; min-height: 20px;"></div>
    </div>

    <div id="screen-profile" class="screen">
        <h2>Твой профиль</h2>
        <div class="stats-card">
            <p>Всего кликов: <span id="stat-clicks">0</span></p>
            <p>Кейсов открыто: <span id="stat-cases">0</span></p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchScreen('clicker', this)">
            <div class="nav-icon">👆</div>
            <div>Кликер</div>
        </div>
        <div class="nav-item" onclick="switchScreen('cases', this)">
            <div class="nav-icon">🔥</div>
            <div>Кейсы</div>
        </div>
        <div class="nav-item" onclick="switchScreen('profile', this)">
            <div class="nav-icon">👤</div>
            <div>Профиль</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Отображаем имя пользователя из Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }

        // Игровая статистика (состояние)
        let balance = 0.00;
        let totalClicks = 0;
        let totalCasesOpened = 0;

        const casePrice = 5.00;
        const items = [
            { name: "P250 | Sand Dune", price: "0.03", rarity: "mil-spec", img: "berettas.png" },
            { name: "AK-47 | Inheritance", price: "120.00", rarity: "covert", img: "ak47.png" },
            { name: "Kukri Knife | Fade", price: "800.00", rarity: "special", img: "kukri.png" }
        ];

        // Функция переключения вкладок (как в Skinoz)
        function switchScreen(screenName, element) {
            // Скрываем все экраны
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            // Убираем активный класс у кнопок меню
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));

            // Показываем нужный экран и активируем кнопку
            document.getElementById(`screen-${screenName}`).classList.add('active');
            element.classList.add('active');

            if(screenName === 'cases') generateTape();
        }

        // Логика кликера
        function earnCoins(event) {
            balance += 0.10;
            totalClicks++;
            updateUI();

            // Легкая вибрация при клике
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(2);
            document.getElementById('stat-clicks').innerText = totalClicks;
            document.getElementById('stat-cases').innerText = totalCasesOpened;
        }

        // Логика рулетки
        const tape = document.getElementById('tape');
        function generateTape() {
            tape.innerHTML = '';
            for (let i = 0; i < 40; i++) {
                const randomItem = items[Math.floor(Math.random() * items.length)];
                const card = document.createElement('div');
                card.className = `weapon-card ${randomItem.rarity}`;
                card.innerHTML = `<img src="${randomItem.img || ''}"><br>${randomItem.name}`;
                tape.appendChild(card);
            }
        }

        function openCase() {
            if (balance < casePrice) {
                tg.showAlert("Недостаточно денег! Потапай на первой вкладке 👆");
                return;
            }

            balance -= casePrice;
            totalCasesOpened++;
